name: Build and Test

on:
  push:
    branches: [ main ]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg-version: ['18.3.0', '17.9.0', '16.13.0']

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          10.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore
      
    - name: Test
      env:
        PG_VERSION: ${{ matrix.pg-version }}
      run: dotnet test --no-build --verbosity normal --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml --results-directory ./TestResults

    - name: Upload coverage to Coveralls
      if: matrix.pg-version == '18.3.0'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: TestResults/coverage.cobertura.xml
        format: cobertura

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build Release configuration
      run: dotnet build --configuration Release /p:Version=${{ steps.get_version.outputs.VERSION }} --no-restore

    - name: Pack
      run: dotnet pack --no-build --configuration Release /p:Version=${{ steps.get_version.outputs.VERSION }} --output ./nupkgs

    - name: Publish to NuGet
      run: |
        dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
